name: math_game_2
description: A fun math game for 2nd grade elementary students to practice +, -, x and / under 100.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  audioplayers: ^6.1.0
  flutter_local_notifications: ^19.2.1
  flutter_timezone: ^4.1.0
  shared_preferences: ^2.2.2
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/math_master_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/pets/
    - assets/sounds/
    - docs/privacy-policy/
