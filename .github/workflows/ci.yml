name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.24.3"

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=android,ios,web --org com.mathmasters --project-name math_game_2 .

      - name: Update generated app metadata
        run: |
          python - <<'PY'
          import json
          import plistlib
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          manifest.write_text(
              manifest.read_text().replace(
                  'android:label="math_game_2"',
                  'android:label="Math Master"',
              )
          )

          info_plist = Path("ios/Runner/Info.plist")
          with info_plist.open("rb") as file:
              plist = plistlib.load(file)
          plist["CFBundleDisplayName"] = "Math Master"
          plist["CFBundleName"] = "Math Master"
          with info_plist.open("wb") as file:
              plistlib.dump(plist, file)

          web_manifest = Path("web/manifest.json")
          if web_manifest.exists():
              manifest_json = json.loads(web_manifest.read_text())
              manifest_json["name"] = "Math Master"
              manifest_json["short_name"] = "Math Master"
              web_manifest.write_text(
                  json.dumps(manifest_json, indent=2, ensure_ascii=False) + "\n"
              )

          web_index = Path("web/index.html")
          if web_index.exists():
              web_index.write_text(
                  web_index.read_text().replace(
                      "<title>math_game_2</title>",
                      "<title>Math Master</title>",
                  )
              )
          PY

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: math-masters-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: math-masters-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=web --org com.mathmasters --project-name math_game_2 .

      - name: Update generated web metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          web_manifest = Path("web/manifest.json")
          if web_manifest.exists():
              manifest_json = json.loads(web_manifest.read_text())
              manifest_json["name"] = "Math Master"
              manifest_json["short_name"] = "Math Master"
              web_manifest.write_text(
                  json.dumps(manifest_json, indent=2, ensure_ascii=False) + "\n"
              )

          web_index = Path("web/index.html")
          if web_index.exists():
              web_index.write_text(
                  web_index.read_text().replace(
                      "<title>math_game_2</title>",
                      "<title>Math Master</title>",
                  )
              )
          PY

      - name: Build web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: math-masters-web
          path: build/web
          if-no-files-found: error
