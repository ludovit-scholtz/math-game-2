name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=android,ios,web --org io.biatec --project-name math_master .

      - name: Update generated app metadata
        run: |
          python - <<'PY'
          import json
          import plistlib
          import re
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          manifest_text = manifest.read_text()
          manifest_text = re.sub(
            r'android:label="[^"]+"',
            'android:label="Math Master"',
            manifest_text,
            count=1,
          )
          notification_permission = '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />'
          if notification_permission not in manifest_text:
              manifest_text = manifest_text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    '
                  + notification_permission,
                  1,
              )
          manifest.write_text(manifest_text)

          build_gradle = Path("android/app/build.gradle.kts")
          build_gradle_text = build_gradle.read_text()
          if "isCoreLibraryDesugaringEnabled = true" not in build_gradle_text:
              build_gradle_text = build_gradle_text.replace(
                  "    compileOptions {\n",
                  "    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n",
                  1,
              )
          if "coreLibraryDesugaring(" not in build_gradle_text:
              build_gradle_text += (
                  "\ndependencies {\n"
                  "    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.1.5\")\n"
                  "}\n"
              )
          build_gradle.write_text(build_gradle_text)

          info_plist = Path("ios/Runner/Info.plist")
          with info_plist.open("rb") as file:
              plist = plistlib.load(file)
          plist["CFBundleDisplayName"] = "Math Master"
          plist["CFBundleName"] = "Math Master"
          with info_plist.open("wb") as file:
              plistlib.dump(plist, file)

          web_manifest = Path("web/manifest.json")
          if web_manifest.exists():
              manifest_json = json.loads(web_manifest.read_text())
              manifest_json["name"] = "Math Master"
              manifest_json["short_name"] = "Math Master"
              web_manifest.write_text(
                  json.dumps(manifest_json, indent=2, ensure_ascii=False) + "\n"
              )

          web_index = Path("web/index.html")
          if web_index.exists():
              web_index.write_text(
                re.sub(
                  r"<title>.*?</title>",
                  "<title>Math Master</title>",
                  web_index.read_text(),
                  count=1,
                )
              )
          PY

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: math-masters-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: math-masters-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=web --org io.biatec --project-name math_master .

      - name: Update generated web metadata
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          web_manifest = Path("web/manifest.json")
          if web_manifest.exists():
              manifest_json = json.loads(web_manifest.read_text())
              manifest_json["name"] = "Math Master"
              manifest_json["short_name"] = "Math Master"
              web_manifest.write_text(
                  json.dumps(manifest_json, indent=2, ensure_ascii=False) + "\n"
              )

          web_index = Path("web/index.html")
          if web_index.exists():
              web_index.write_text(
                re.sub(
                  r"<title>.*?</title>",
                  "<title>Math Master</title>",
                  web_index.read_text(),
                  count=1,
                )
              )
          PY

      - name: Build web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: math-masters-web
          path: build/web
          if-no-files-found: error
