name: Release (Signed AAB)

# Builds a Google Play production-signed Android App Bundle (.aab).
#
# Triggered by pushing a version tag (e.g. v1.0.0) or manually via the
# "Run workflow" button. Requires the following repository secrets to be set
# (see docs/ANDROID_SIGNING.md for how to create and store them):
#   ANDROID_KEYSTORE_BASE64  - base64-encoded upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD - keystore (store) password
#   ANDROID_KEY_PASSWORD      - key password
#   ANDROID_KEY_ALIAS         - key alias

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  build-signed-aab:
    name: Build Signed App Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=android,ios,web --org io.biatec --project-name math_master .

      - name: Update generated app metadata
        run: |
          python - <<'PY'
          import json
          import plistlib
          import re
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          manifest.write_text(
            re.sub(
              r'android:label="[^"]+"',
              'android:label="Math Master"',
              manifest.read_text(),
              count=1,
            )
          )

          info_plist = Path("ios/Runner/Info.plist")
          with info_plist.open("rb") as file:
              plist = plistlib.load(file)
          plist["CFBundleDisplayName"] = "Math Master"
          plist["CFBundleName"] = "Math Master"
          with info_plist.open("wb") as file:
              plistlib.dump(plist, file)
          PY

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See docs/ANDROID_SIGNING.md."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Configure Android release signing
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          build_gradle = Path("android/app/build.gradle.kts")
          text = build_gradle.read_text()

          imports = "import java.io.FileInputStream\nimport java.util.Properties\n\n"
          if not text.startswith("import java.io.FileInputStream"):
              text = imports + text

          properties_block = """val keystoreProperties = Properties()
          val keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          """
          if properties_block not in text:
              anchor = "android {\n"
              if anchor not in text:
                  raise SystemExit("Could not find the android block in android/app/build.gradle.kts")
              text = text.replace(anchor, properties_block + anchor, 1)

          signing_configs_block = """    signingConfigs {
              create("release") {
                  val storeFilePath = keystoreProperties.getProperty("storeFile")
                  if (storeFilePath != null) {
                      storeFile = rootProject.file("app/$storeFilePath")
                  }
                  storePassword = keystoreProperties.getProperty("storePassword")
                  keyAlias = keystoreProperties.getProperty("keyAlias")
                  keyPassword = keystoreProperties.getProperty("keyPassword")
              }
          }

          """
          if "signingConfigs {" not in text:
              build_types_match = re.search(r"^\s*buildTypes\s*\{", text, flags=re.MULTILINE)
              if not build_types_match:
                  raise SystemExit("Could not find the buildTypes block in android/app/build.gradle.kts")
              text = text[:build_types_match.start()] + signing_configs_block + text[build_types_match.start():]

          debug_signing_pattern = re.compile(
              r'^(?P<indent>\s*)signingConfig\s*=\s*signingConfigs\.getByName\("debug"\)\s*$',
              flags=re.MULTILINE,
          )

          def replace_debug_signing(match):
              indent = match.group("indent")
              return (
                  f'{indent}signingConfig = if (keystorePropertiesFile.exists()) {{\n'
                  f'{indent}    signingConfigs.getByName("release")\n'
                  f'{indent}}} else {{\n'
                  f'{indent}    signingConfigs.getByName("debug")\n'
                  f'{indent}}}'
              )

          text, replacements = debug_signing_pattern.subn(replace_debug_signing, text, count=1)
          if replacements != 1:
              raise SystemExit("Could not find the generated debug signing line in android/app/build.gradle.kts")

          build_gradle.write_text(text)
          PY

      - name: Build signed App Bundle (release)
        run: flutter build appbundle --release

      - name: Verify the bundle is signed
        run: |
          BUNDLE=build/app/outputs/bundle/release/app-release.aab
          test -f "$BUNDLE"
          echo "Built $BUNDLE"
          # Fail fast if the bundle was still signed with the Android debug key.
          unzip -p "$BUNDLE" META-INF/*.RSA 2>/dev/null \
            | keytool -printcert 2>/dev/null \
            | grep -i "Android Debug" \
            && { echo "::error::Bundle is signed with the debug key, not the upload key."; exit 1; } \
            || echo "Bundle is not signed with the debug key."

      - name: Clean up signing secrets
        if: always()
        run: rm -f android/key.properties android/app/upload-keystore.jks

      - name: Upload signed App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: math-masters-signed-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
