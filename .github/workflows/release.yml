name: Release (Google Play Internal Testing)

# Builds a Google Play production-signed Android App Bundle (.aab) and uploads
# it to the Google Play internal testing track.
#
# Triggered by pushing a version tag (e.g. v1.0.0) or manually via the
# "Run workflow" button. Requires the following repository secrets to be set
# (see docs/ANDROID_SIGNING.md and docs/GOOGLE_PLAY_RELEASE.md):
#   ANDROID_KEYSTORE_BASE64  - base64-encoded upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD - keystore (store) password
#   ANDROID_KEY_PASSWORD      - key password
#   ANDROID_KEY_ALIAS         - key alias
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON - Google Play service account JSON key

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.44.0"
  ANDROID_PACKAGE_NAME: io.biatec.math_master

jobs:
  build-signed-aab:
    name: Build Signed App Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release version from git tag
        id: release_version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="$(git describe --tags --abbrev=0)"
          fi

          VERSION_NAME="${TAG_NAME#v}"

          if ! [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Release tag must use semantic versioning like v1.2.3. Found: $TAG_NAME"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))

          echo "Using release tag $TAG_NAME"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Apply release version to pubspec
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          pubspec = Path("pubspec.yaml")
          version = f'{os.environ["VERSION_NAME"]}+{os.environ["VERSION_CODE"]}'
          text = pubspec.read_text()
          text, replacements = re.subn(
              r"^version:\s*.+$",
              f"version: {version}",
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if replacements != 1:
              raise SystemExit("Could not update version in pubspec.yaml")
          pubspec.write_text(text)
          print(f"Updated pubspec.yaml to version {version}")
          PY

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=android,ios,web --org io.biatec --project-name math_master .

      - name: Update generated app metadata
        run: |
          python - <<'PY'
          import json
          import plistlib
          import re
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          manifest_text = manifest.read_text()
          manifest_text = re.sub(
            r'android:label="[^"]+"',
            'android:label="Math Master"',
            manifest_text,
            count=1,
          )
          notification_permission = '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />'
          if notification_permission not in manifest_text:
              manifest_text = manifest_text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    '
                  + notification_permission,
                  1,
              )
          manifest.write_text(manifest_text)

          build_gradle = Path("android/app/build.gradle.kts")
          build_gradle_text = build_gradle.read_text()
          if "isCoreLibraryDesugaringEnabled = true" not in build_gradle_text:
              build_gradle_text = build_gradle_text.replace(
                  "    compileOptions {\n",
                  "    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n",
                  1,
              )
          if "coreLibraryDesugaring(" not in build_gradle_text:
              build_gradle_text += (
                  "\ndependencies {\n"
                  "    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.1.5\")\n"
                  "}\n"
              )
          build_gradle.write_text(build_gradle_text)

          info_plist = Path("ios/Runner/Info.plist")
          with info_plist.open("rb") as file:
              plist = plistlib.load(file)
          plist["CFBundleDisplayName"] = "Math Master"
          plist["CFBundleName"] = "Math Master"
          with info_plist.open("wb") as file:
              plistlib.dump(plist, file)
          PY

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See docs/ANDROID_SIGNING.md."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Configure Android release signing
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          build_gradle = Path("android/app/build.gradle.kts")
          text = build_gradle.read_text()

          imports = "import java.io.FileInputStream\nimport java.util.Properties\n\n"
          if not text.startswith("import java.io.FileInputStream"):
              text = imports + text

          properties_block = """val keystoreProperties = Properties()
          val keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          """
          if properties_block not in text:
              anchor = "android {\n"
              if anchor not in text:
                  raise SystemExit("Could not find the android block in android/app/build.gradle.kts")
              text = text.replace(anchor, properties_block + anchor, 1)

          signing_configs_block = """    signingConfigs {
              create("release") {
                  val storeFilePath = keystoreProperties.getProperty("storeFile")
                  if (storeFilePath != null) {
                      storeFile = rootProject.file("app/$storeFilePath")
                  }
                  storePassword = keystoreProperties.getProperty("storePassword")
                  keyAlias = keystoreProperties.getProperty("keyAlias")
                  keyPassword = keystoreProperties.getProperty("keyPassword")
              }
          }

          """
          if "signingConfigs {" not in text:
              build_types_match = re.search(r"^\s*buildTypes\s*\{", text, flags=re.MULTILINE)
              if not build_types_match:
                  raise SystemExit("Could not find the buildTypes block in android/app/build.gradle.kts")
              text = text[:build_types_match.start()] + signing_configs_block + text[build_types_match.start():]

          text, version_code_replacements = re.subn(
              r"^(?P<indent>\s*)versionCode\s*=\s*flutter\.versionCode\s*$",
              r'\g<indent>versionCode = System.getenv("VERSION_CODE")?.toInt() ?: flutter.versionCode',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if version_code_replacements != 1:
              raise SystemExit("Could not find the generated versionCode line in android/app/build.gradle.kts")

          text, version_name_replacements = re.subn(
              r"^(?P<indent>\s*)versionName\s*=\s*flutter\.versionName\s*$",
              r'\g<indent>versionName = System.getenv("VERSION_NAME") ?: flutter.versionName',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if version_name_replacements != 1:
              raise SystemExit("Could not find the generated versionName line in android/app/build.gradle.kts")

          debug_signing_pattern = re.compile(
              r'^(?P<indent>\s*)signingConfig\s*=\s*signingConfigs\.getByName\("debug"\)\s*$',
              flags=re.MULTILINE,
          )

          def replace_debug_signing(match):
              indent = match.group("indent")
              return (
                  f'{indent}signingConfig = if (keystorePropertiesFile.exists()) {{\n'
                  f'{indent}    signingConfigs.getByName("release")\n'
                  f'{indent}}} else {{\n'
                  f'{indent}    signingConfigs.getByName("debug")\n'
                  f'{indent}}}'
              )

          text, replacements = debug_signing_pattern.subn(replace_debug_signing, text, count=1)
          if replacements != 1:
              raise SystemExit("Could not find the generated debug signing line in android/app/build.gradle.kts")

          build_gradle.write_text(text)
          PY

      - name: Build signed App Bundle (release)
        run: |
          flutter build appbundle \
            --release \
            --build-name "$VERSION_NAME" \
            --build-number "$VERSION_CODE"

      - name: Verify bundle manifest metadata
        env:
          BUNDLETOOL_VERSION: "1.18.2"
        run: |
          BUNDLE=build/app/outputs/bundle/release/app-release.aab
          test -f "$BUNDLE"
          curl -fsSL \
            -o bundletool.jar \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar"
          java -jar bundletool.jar dump manifest \
            --bundle="$BUNDLE" \
            --module=base \
            > bundle-manifest.xml

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          manifest = Path("bundle-manifest.xml").read_text()

          def required_attribute(name):
              match = re.search(rf'(?<![\w:]){re.escape(name)}="([^"]+)"', manifest)
              if not match:
                  raise SystemExit(f"Could not find {name} in App Bundle manifest")
              return match.group(1)

          actual_application_id = required_attribute("package")
          actual_version_code = int(required_attribute("android:versionCode"))
          actual_version_name = required_attribute("android:versionName")

          expected_application_id = os.environ["ANDROID_PACKAGE_NAME"]
          expected_version_code = int(os.environ["VERSION_CODE"])
          expected_version_name = os.environ["VERSION_NAME"]

          print(f"AAB applicationId: {actual_application_id}")
          print(f"AAB versionName: {actual_version_name}")
          print(f"AAB versionCode: {actual_version_code}")

          if actual_application_id != expected_application_id:
              raise SystemExit(
                  f"Expected applicationId {expected_application_id}, got {actual_application_id}"
              )
          if actual_version_name != expected_version_name:
              raise SystemExit(
                  f"Expected versionName {expected_version_name}, got {actual_version_name}"
              )
          if actual_version_code != expected_version_code:
              raise SystemExit(
                  f"Expected versionCode {expected_version_code}, got {actual_version_code}"
              )
          PY

      - name: Verify the bundle is signed
        run: |
          BUNDLE=build/app/outputs/bundle/release/app-release.aab
          test -f "$BUNDLE"
          echo "Built $BUNDLE"
          # Fail fast if the bundle was still signed with the Android debug key.
          unzip -p "$BUNDLE" META-INF/*.RSA 2>/dev/null \
            | keytool -printcert 2>/dev/null \
            | grep -i "Android Debug" \
            && { echo "::error::Bundle is signed with the debug key, not the upload key."; exit 1; } \
            || echo "Bundle is not signed with the debug key."

      - name: Validate Google Play service account secret
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is not set. See docs/GOOGLE_PLAY_RELEASE.md."
            exit 1
          fi

      - name: Upload to Google Play internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.ANDROID_PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
          releaseName: ${{ steps.release_version.outputs.version_name }} (${{ steps.release_version.outputs.version_code }})

      - name: Clean up signing secrets
        if: always()
        run: rm -f android/key.properties android/app/upload-keystore.jks

      - name: Upload signed App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: math-masters-${{ steps.release_version.outputs.version_name }}-signed-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
